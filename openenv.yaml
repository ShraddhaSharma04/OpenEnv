name: customer-support-ticket-triage-openenv
version: "1.0.0"
description: A real-world OpenEnv environment for customer support ticket triage.

environment:
  base_url: https://shraddhasharma24-openenv.hf.space
  endpoints:
    reset: /reset
    state: /state
    step: /step

task:
  type: single_step
  difficulties:
    - easy
    - medium
    - hard

action_space:
  type: object
  fields:
    category:
      type: string
      description: Predicted issue category
    priority:
      type: string
      enum: [low, medium, high]
      description: Predicted priority level
    assigned_team:
      type: string
      description: Team assigned to the ticket
    next_action:
      type: string
      description: Suggested next action for support handling

observation_space:
  type: object
  fields:
    customer_type:
      type: string
    product:
      type: string
    message:
      type: string
    previous_status:
      type: string

reward:
  range: [0.0, 1.0]
  description: Weighted score based on category, priority, assigned team, and next action keyword matching.

inference:
  script: inference.py

deployment:
  framework: fastapi
  containerized: true
